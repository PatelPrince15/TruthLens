<<html>
<head>
  
  <title>TruthLens - Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body class="gradient-bg" onload="loadDashboard()">


  <nav class="navbar">
    <div class="nav-left">🔍 TruthLens</div>
    <div class="nav-right">
      <a href="index.html" class="nav-btn">Home</a>
      <a href="dashboard.html" class="nav-btn">Dashboard</a>
      <a href="history.html" class="nav-btn">History</a>
      <a href="stats.html" class="nav-btn">Stats</a>
      <button class="nav-btn" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="container fade-in">
    <h2 id="welcome">Enter Your Statement</h2>
    <textarea id="statement" placeholder="Enter your statement here..."></textarea>
    <div class="buttons">
      <button onclick="analyzeText()" class="main-btn">Detect Lie</button>
      <button onclick="resetInput()" class="main-btn">Reset</button>
    </div>

    <div id="analysis">
      <h3 id="result"></h3>
      <progress id="progress" value="0" max="100"></progress>
      <p id="personality"></p>
      <p id="mood"></p>
      <ul id="reasons"></ul>
    </div>
  </div>

  
  <div id="toast">Analysis complete!</div>

  
  <footer class="footer">
    <p>© 2026 TruthLens | Educational Simulation Project</p>
  </footer>

</body>
</html>
